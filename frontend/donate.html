<div style="max-width: 400px; margin: auto; background: white; padding: 2rem; border-radius: 1rem;">
    <h3><i class="fas fa-hand-holding-heart"></i> Berdonasi</h3>
    <input type="email" id="email" placeholder="Email Anda" style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <input type="number" id="amount" placeholder="Nominal (Rp)" style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <button onclick="createDonation()" class="btn-main" style="width: 100%;">Bayar dengan Mayar</button>
</div>

<script>
    async function createDonation() {
        const data = {
            email: document.getElementById('email').value,
            amount: document.getElementById('amount').value,
            category: 'Zakat'
        };
        const res = await fetch('/api/v1/donate/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        window.location.href = result.payment_url;
    }
</script>
