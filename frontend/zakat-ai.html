<div style="max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 1rem;">
    <h3><i class="fas fa-robot"></i> ZakatVibe AI Assistant</h3>
    <textarea id="query" placeholder="Contoh: Saya punya tabungan 50jt, berapa zakat maal saya?" style="width: 100%; height: 100px; padding: 10px; margin: 10px 0; border: 1px solid #ddd;"></textarea>
    <button onclick="askAI()" class="btn-main" style="width: 100%;">Tanya AI Sekarang</button>
    <div id="ai-response" style="margin-top: 1rem; padding: 1rem; background: #f8fafc; border-radius: 8px;"></div>
</div>

<script>
    async function askAI() {
        const query = document.getElementById('query').value;
        const resDiv = document.getElementById('ai-response');
        resDiv.innerText = "AI sedang berpikir...";
        
        const res = await fetch('/api/v1/zakat/consult', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({query: query})
        });
        const data = await res.json();
        resDiv.innerText = data.message; 
    }
</script>
