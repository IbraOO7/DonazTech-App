<div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
  <div class="bg-green-600 p-6 text-center text-white">
    <h3 class="text-2xl font-bold"><i class="fas fa-hand-holding-heart mr-2"></i> Tunaikan Zakat</h3>
    <p class="text-green-100 text-sm mt-1">Donasi Anda membawa keberkahan</p>
  </div>
  
  <div class="p-8">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Anda</label>
        <input type="email" id="email" placeholder="nama@email.com" 
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nominal (Rp)</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-500">Rp</span>
          <input type="number" id="amount" placeholder="50.000" 
            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tujuan Donasi</label>
        <select id="charity-select" class="w-full">
          <option value="">Pilih Yayasan / Masjid...</option>
          </select>
      </div>

      <button id="pay-btn" class="pay-btn-action w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg flex items-center justify-center disabled:opacity-50">
        <span id="btn-text">Bayar dengan Mayar</span>
        <i id="spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
      </button>
    </div>
  </div>
</div>

<script>
    const charitySelect = new Choices('#charity-select', {
        searchEnabled: true,
        itemSelectText: 'Pilih',
    });
    fetch('/v1/charities/list')
        .then(res => res.json())
        .then(data => {
            charitySelect.setChoices(data.map(c => ({ value: c.id, label: c.name })), 'value', 'label', false);
    });
    
    (function() {
        const handlePayment = async (e) => {
            if (!e.target.closest('#pay-btn')) return;

            const email = document.getElementById('email').value.trim();
            const amount = document.getElementById('amount').value;
            const btn = document.getElementById('pay-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');

            if (!email || !amount || parseFloat(amount) < 10000) {
                alert("Harap masukkan email dan nominal donasi yang valid (min. Rp 10.000)");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "Memproses...";
            spinner.classList.remove('hidden');

            try {
                const res = await fetch('/v1/donate/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, amount: parseFloat(amount), category: 'Zakat' })
                });
                
                const result = await res.json();
                if (res.ok && result.payment_url) {
                    window.location.href = result.payment_url;
                } else {
                    throw new Error(result.error || "Gagal membuat sesi pembayaran");
                }
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btnText.innerText = "Bayar dengan Mayar";
                spinner.classList.add('hidden');
            }
        };
        document.removeEventListener('click', handlePayment); 
        document.addEventListener('click', handlePayment);
    })();
</script>
