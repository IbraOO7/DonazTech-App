<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonazTech AI | Berkah Ramadhan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
            <a href="#home" class="text-2xl font-extrabold text-green-600 flex items-center gap-2">
                <i class="fas fa-moon"></i> DonazTech
            </a>
            <div class="hidden md:flex gap-8 font-semibold text-gray-600 items-center">
                <a href="#home">Beranda</a>
                <a href="#zakat-ai">Konsultasi AI</a>
                <a href="#donate">Donasi</a>
                <a href="#history">Riwayat</a>
                <button id="auth-btn" class="px-6 py-2 rounded-full transition shadow-lg">Login</button>
            </div>
            <button id="mobile-toggle" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t p-5 flex flex-col gap-4">
            <a href="#home">Beranda</a>
            <a href="#zakat-ai">Konsultasi AI</a>
            <a href="#donate">Donasi</a>
            <a href="#history">Riwayat</a>
            <button id="mobile-auth-btn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Login</button>
        </div>
    </nav>

    <main id="main-content" class="min-h-screen py-8 px-4"></main>

    <div id="login-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm px-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center">Masuk ke DonazTech</h2>
            <input type="email" id="login-email" class="w-full px-4 py-3 mb-4 rounded-xl border border-gray-300 outline-none" placeholder="Alamat Email">
            <button id="login-submit-btn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Lanjutkan</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ROUTES = { 'home': '/static/home.html', 'zakat-ai': '/static/zakat-ai.html', 'donate': '/static/donate.html', 'history': '/static/history.html' };

        window.toggleMobileMenu = () => {
            const menu = document.getElementById('mobile-menu');
            if (menu) {
                menu.classList.toggle('hidden');
            }
        };
        document.addEventListener('click', async (e) => {
            // Auth
            if (e.target.id === 'auth-btn' || e.target.id === 'mobile-auth-btn') handleAuth();
            if (e.target.id === 'login-submit-btn') performLogin();
            if (e.target.closest('#mobile-toggle')) {
                window.toggleMobileMenu();
            }
            
            // Panggilan Fungsi Halaman (Zakat AI)
            if (e.target.id === 'get-rec-btn') {
                if (typeof window.getRecommendationWithLocation === 'function') {
                    window.getRecommendationWithLocation();
                } else {
                    alert("Sistem sedang memuat modul AI, silakan tunggu sejenak...");
                }
            }
        });

        // 2. LOGIKA AUTENTIKASI
        function updateAuthUI() {
            const isAuth = !!localStorage.getItem('token');
            const btns = [document.getElementById('auth-btn'), document.getElementById('mobile-auth-btn')];
            btns.forEach(btn => {
                if(!btn) return;
                btn.innerText = isAuth ? "Logout" : "Login";
                btn.className = isAuth ? "bg-red-500 text-white px-6 py-2 rounded-full" : "bg-green-600 text-white px-6 py-2 rounded-full";
            });
        }

        async function performLogin() {
            const email = document.getElementById('login-email').value;
            const res = await fetch('/v1/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email }) });
            if (res.ok) { const d = await res.json(); localStorage.setItem('token', d.token); location.reload(); }
            else alert("Login Gagal");
        }

        function handleAuth() {
            if (localStorage.getItem('token')) {
                if(confirm("Keluar dari akun?")) { localStorage.removeItem('token'); location.reload(); }
            } else { document.getElementById('login-modal').classList.remove('hidden'); }
        }

        async function router() {
            const hash = window.location.hash.substring(1) || 'home';
            const contentDiv = document.getElementById('main-content');
            const protectedRoutes = ['zakat-ai', 'donate', 'history'];
            const isTokenValid = !!localStorage.getItem('token');
            if (protectedRoutes.includes(hash) && !isTokenValid) {
                alert("Mohon maaf, silakan login terlebih dahulu untuk mengakses fitur ini.");
                window.location.hash = 'home'; 
                return;
            }
            try {
                const res = await fetch(ROUTES[hash] || ROUTES['home']);
                if (!res.ok) throw new Error("Halaman tidak ditemukan");
                const html = await res.text();  
                contentDiv.innerHTML = html;
                document.querySelectorAll('.dynamic-script').forEach(s => s.remove());
                const scripts = contentDiv.getElementsByTagName('script');
                for (let s of scripts) {
                    const newScript = document.createElement('script');
                    newScript.textContent = `(function(){ ${s.textContent} })();`; 
                    newScript.classList.add('dynamic-script');
                    document.body.appendChild(newScript);
                }
            } catch (err) {
                console.error("Router error:", err);
                window.location.hash = 'home';
            }
            updateAuthUI();
        }

        window.addEventListener('hashchange', router);
        window.addEventListener('load', () => { updateAuthUI(); router(); });
    </script>
</body>
</html>
